services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aumiau}
      POSTGRES_USER: ${POSTGRES_USER:-aumiau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aumiau}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aumiau}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-24}
      REFRESH_TTL_DAYS: ${REFRESH_TTL_DAYS:-30}
      RESET_TOKEN_TTL_MINUTES: ${RESET_TOKEN_TTL_MINUTES:-30}
      SMTP_HOST: ${SMTP_HOST:-mail.aumiau.app.br}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-suporte@aumiau.app.br}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?defina SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-suporte@aumiau.app.br}
      EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-24}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_ENVIRONMENT: ${MERCADOPAGO_ENVIRONMENT:-test}
      MERCADOPAGO_TEST_PAYER_EMAIL: ${MERCADOPAGO_TEST_PAYER_EMAIL:-test_user_br@testuser.com}
      MERCADOPAGO_NOTIFICATION_URL: ${MERCADOPAGO_NOTIFICATION_URL:-https://aumiau.app.br/webhooks/mercadopago}
      AUMIAU_BOOTSTRAP_EMAIL: ${AUMIAU_BOOTSTRAP_EMAIL:?defina AUMIAU_BOOTSTRAP_EMAIL}
      AUMIAU_BOOTSTRAP_PASSWORD: ${AUMIAU_BOOTSTRAP_PASSWORD:?defina AUMIAU_BOOTSTRAP_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      AUMIAU_DOMAIN: ${AUMIAU_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
