services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:15.1.0
    container_name: aumiau-mailserver
    hostname: mail.aumiau.app.br
    env_file:
      - .env
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - ./docker-data/dms/mail-data:/var/mail
      - ./docker-data/dms/mail-state:/var/mail-state
      - ./docker-data/dms/mail-logs:/var/log/mail
      - ./docker-data/dms/config:/tmp/docker-mailserver
      - /var/lib/docker/volumes/backend_caddy_data/_data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/mail.aumiau.app.br:/etc/dms/tls:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      OVERRIDE_HOSTNAME: mail.aumiau.app.br
      POSTMASTER_ADDRESS: support@aumiau.app.br
      ENABLE_RSPAMD: "1"
      ENABLE_CLAMAV: "1"
      ENABLE_FAIL2BAN: "1"
      ENABLE_OPENDKIM: "1"
      ENABLE_OPENDMARC: "1"
      ENABLE_IMAP: "1"
      ENABLE_POP3: "0"
      SPOOF_PROTECTION: "1"
      SSL_TYPE: manual
      SSL_CERT_PATH: /etc/dms/tls/mail.aumiau.app.br.crt
      SSL_KEY_PATH: /etc/dms/tls/mail.aumiau.app.br.key
      TZ: America/Manaus
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
