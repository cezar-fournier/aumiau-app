name: aumiau_app
description: "AuMiau: rotina, saúde e histórico dos pets em um só lugar."
publish_to: 'none'
version: 0.2.5+8

environment:
  sdk: ^3.12.2

dependencies:
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  cross_file: ^0.3.5+4
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_secure_storage: ^9.2.4
  file_picker: ^11.0.2
  http: ^1.6.0
  pdf: ^3.13.0
  printing: ^5.15.0
  share_plus: ^12.0.2
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.4
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Variable.ttf
    - assets/branding/aumiau_wordmark.png
    - assets/branding/aumiau_canva_animation.gif
    - assets/branding/aumiau_app_icon_dark.png
