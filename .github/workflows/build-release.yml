name: Build and publish AuMiau release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test

      - name: Install, analyze and test partner app
        working-directory: partner_app
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Validate production signing secrets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Secret $name nĂŁo configurado. Releases versionadas exigem assinatura Android de produĂ§ĂŁo."
              exit 1
            fi
          done

      - name: Configure Android production signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/aumiau-release.jks"
          {
            echo "storeFile=$RUNNER_TEMP/aumiau-release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties
          cp android/key.properties partner_app/android/key.properties

      - name: Build release APK and AAB
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == "$GITHUB_REF_NAME" ]]; then
            version="0.1.0"
          fi
          build_number="${GITHUB_RUN_NUMBER}"
          common_args=(
            "--release"
            "--build-name=$version"
            "--build-number=$build_number"
            "--dart-define=AUMIAU_API_BASE_URL=https://aumiau.app.br/"
            "--dart-define=AUMIAU_APP_VERSION=$version"
          )
          flutter build appbundle "${common_args[@]}"
          flutter build apk "${common_args[@]}"
          cp build/app/outputs/bundle/release/app-release.aab \
            "build/app/outputs/bundle/release/aumiau-${GITHUB_REF_NAME}.aab"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/aumiau-${GITHUB_REF_NAME}.apk"

          pushd partner_app
          flutter build appbundle "${common_args[@]}"
          flutter build apk "${common_args[@]}"
          cp build/app/outputs/bundle/release/app-release.aab \
            "build/app/outputs/bundle/release/aumiau-partner-${GITHUB_REF_NAME}.aab"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/aumiau-partner-${GITHUB_REF_NAME}.apk"
          popd

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aumiau-release-${{ github.ref_name }}
          path: |
            build/app/outputs/bundle/release/aumiau-${{ github.ref_name }}.aab
            build/app/outputs/flutter-apk/aumiau-${{ github.ref_name }}.apk
            partner_app/build/app/outputs/bundle/release/aumiau-partner-${{ github.ref_name }}.aab
            partner_app/build/app/outputs/flutter-apk/aumiau-partner-${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "build/app/outputs/bundle/release/aumiau-${GITHUB_REF_NAME}.aab" \
            "build/app/outputs/flutter-apk/aumiau-${GITHUB_REF_NAME}.apk" \
            "partner_app/build/app/outputs/bundle/release/aumiau-partner-${GITHUB_REF_NAME}.aab" \
            "partner_app/build/app/outputs/flutter-apk/aumiau-partner-${GITHUB_REF_NAME}.apk" \
            --title "AuMiau $GITHUB_REF_NAME" \
            --generate-notes

      - name: Remove signing material
        if: always() && startsWith(github.ref, 'refs/tags/v')
        run: |
          rm -f android/key.properties partner_app/android/key.properties "$RUNNER_TEMP/aumiau-release.jks"
