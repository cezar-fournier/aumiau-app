name: Build and publish AuMiau APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == "$GITHUB_REF_NAME" ]]; then
            version="0.1.0"
          fi
          flutter build apk --release \
            --dart-define=AUMIAU_API_BASE_URL=https://aumiau.app.br/ \
            --dart-define=AUMIAU_APP_VERSION="$version"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/aumiau-${GITHUB_REF_NAME}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aumiau-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/aumiau-${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "build/app/outputs/flutter-apk/aumiau-${GITHUB_REF_NAME}.apk" \
            --title "AuMiau $GITHUB_REF_NAME" \
            --generate-notes
